<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --discord: #5865F2;
            --neon-green: #00ff88;
            --neon-blue: #00d2ff;
            --glass: rgba(10, 10, 20, 0.85);
        }

        body {
            margin: 0;
            padding: 20px;
            background: transparent;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Der High-Tech Rahmen mit animiertem Gradient-Border */
        .banner-outer {
            position: relative;
            width: 95%;
            max-width: 950px;
            height: 200px;
            padding: 4px; /* Die Dicke des Leuchtrahmens */
            background: linear-gradient(90deg, var(--discord), var(--neon-blue), var(--neon-green), var(--discord));
            background-size: 300% 300%;
            animation: borderGradient 4s linear infinite;
            clip-path: polygon(5% 0%, 95% 0%, 100% 30%, 100% 70%, 95% 100%, 5% 100%, 0% 70%, 0% 30%);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.5);
        }

        @keyframes borderGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Die Innenfläche (Carbon + Glas) */
        .banner-inner {
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(10, 10, 20, 0.9), rgba(10, 10, 20, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* Carbon Textur */
            clip-path: inherit; /* Übernimmt die Hexagon-Form */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            position: relative;
            overflow: hidden;
        }

        /* Glanzeffekt, der über den Banner wischt */
        .banner-inner::before {
            content: "";
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        /* Content Links */
        .content-left {
            z-index: 5;
        }

        .headline {
            font-size: 3rem;
            text-transform: uppercase;
            line-height: 0.9;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        .sub-headline {
            color: var(--neon-green);
            font-size: 1.6rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .stats-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--neon-green);
            padding: 8px 25px;
            border-radius: 5px;
            font-size: 1.8rem;
        }

        .online-dot {
            width: 16px; height: 16px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green);
            animation: pulse 1s infinite;
        }

        /* QR-Code Section */
        .qr-section {
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .qr-frame {
            background: white;
            padding: 8px;
            border-radius: 12px;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 25px var(--neon-blue);
            position: relative;
        }

        /* Scanner-Linie */
        .qr-frame::after {
            content: "";
            position: absolute;
            left: 0; width: 100%; height: 3px;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 2.5s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 5%; }
            50% { top: 95%; }
        }

        .qr-frame img {
            display: block;
            width: 130px;
            height: 130px;
        }

        @keyframes pulse {
            50% { transform: scale(1.3); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="banner-outer">
        <div class="banner-inner">
            <div class="content-left">
                <div class="sub-headline">GENERATE THE HYPE</div>
                <h1 class="headline">JOIN THE SQUAD</h1>
                <div class="stats-badge">
                    <div class="online-dot"></div>
                    <span id="memberCount">...</span>
                </div>
            </div>

            <div class="qr-section">
                <div class="qr-frame">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://discord.gg/GCdtRkHb6X&color=0a0a14" alt="QR">
                </div>
                <span style="font-size: 0.9rem; color: var(--neon-blue); font-weight: bold;">SCAN TO JOIN</span>
            </div>
        </div>
    </div>

    <script>
        async function update() {
            try {
                const res = await fetch("https://discord.com/api/guilds/1384998084307849367/widget.json");
                const data = await res.json();
                document.getElementById("memberCount").innerText = data.presence_count + " ONLINE";
            } catch(e) {
                document.getElementById("memberCount").innerText = "LIVE NOW";
            }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>
