<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --discord: #5865F2;
            --neon: #00ff88;
            --accent: #9b59ff;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent; /* Wichtig für OBS/TikTok Studio */
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* Der schlanke Banner */
        .action-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 50px; /* Schön flach gehalten */
            background: rgba(15, 15, 26, 0.95);
            border-bottom: 2px solid var(--discord);
            border-top: 2px solid var(--accent);
            position: relative;
            color: white;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5);
        }

        /* Animierter Scanline-Effekt (der Blickfang) */
        .action-banner::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: scan 3s infinite ease-in-out;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 150%; }
        }

        /* Linke Seite: Badge & Text */
        .content-left {
            display: flex;
            align-items: center;
            padding-left: 20px;
            gap: 12px;
        }

        .badge {
            background: var(--discord);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px var(--discord);
        }

        .call-to-action {
            font-size: 16px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .call-to-action span {
            color: var(--neon);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        /* Rechte Seite: Live Counter */
        .content-right {
            display: flex;
            align-items: center;
            padding-right: 20px;
            gap: 8px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon);
        }

        .member-count {
            font-size: 14px;
            color: #ccc;
        }

        /* Link für TikTok Studio Integration */
        .overlay-link {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            text-decoration: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <a href="https://discord.gg/GCdtRkHb6X" target="_blank" class="overlay-link"></a>

    <div class="action-banner">
        <div class="content-left">
            <div class="badge">Discord</div>
            <div class="call-to-action">Join the Squad <span>& Get Hype!</span></div>
        </div>

        <div class="content-right">
            <div class="online-dot"></div>
            <div class="member-count" id="count">Lade...</div>
        </div>
    </div>

    <script>
        async function updateStats() {
            try {
                const response = await fetch("https://discord.com/api/guilds/1384998084307849367/widget.json");
                const data = await response.json();
                document.getElementById("count").innerText = data.presence_count + " Online";
            } catch (e) {
                document.getElementById("count").innerText = "JOIN NOW";
            }
        }
        updateStats();
        setInterval(updateStats, 30000);
    </script>
</body>
</html>
