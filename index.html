<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --discord: #5865F2;
            --neon-green: #00ff88;
            --neon-pink: #ff007a;
            --dark: #050508;
        }

        body {
            margin: 0;
            padding: 15px;
            background: transparent;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* Der massive Power-Banner */
        .power-banner {
            position: relative;
            width: 100%;
            height: 140px; /* Deutlich höher für TikTok Hochformat */
            background: var(--dark);
            /* Scharfe Hexagon-Ecken */
            clip-path: polygon(10% 0%, 90% 0%, 100% 25%, 100% 75%, 90% 100%, 10% 100%, 0% 75%, 0% 25%);
            border: 3px solid var(--discord);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(88, 101, 242, 0.7);
            color: white;
            text-align: center;
        }

        /* Glühender Hintergrund-Effekt */
        .glow-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(88, 101, 242, 0.2) 0%, transparent 70%);
            z-index: 1;
        }

        /* Haupt-Headline */
        .headline {
            z-index: 2;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            margin-bottom: 5px;
        }

        /* Sub-Headline mit Hype-Effekt */
        .hype-text {
            z-index: 2;
            color: var(--neon-green);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; text-shadow: 0 0 15px var(--neon-green); }
            50% { opacity: 0.7; text-shadow: 0 0 5px var(--neon-green); }
        }

        /* Online-Status Sektion (Größer) */
        .stats {
            z-index: 2;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 50px;
            border: 1px solid var(--neon-green);
        }

        .online-dot {
            width: 14px;
            height: 14px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green);
            animation: pulse 1s infinite;
        }

        .count-num {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }

        /* Ticker am unteren Rand */
        .bottom-ticker {
            position: absolute;
            bottom: 5px;
            width: 80%;
            overflow: hidden;
            white-space: nowrap;
            font-size: 0.7rem;
            color: var(--discord);
            z-index: 2;
            opacity: 0.8;
        }

        .ticker-move {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        @keyframes pulse {
            50% { transform: scale(1.3); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="power-banner">
        <div class="glow-overlay"></div>
        
        <div class="headline">JOIN THE SQUAD</div>
        <div class="hype-text">GENERATE THE HYPE</div>

        <div class="stats">
            <div class="online-dot"></div>
            <div class="count-num" id="memberCount">LOADING...</div>
        </div>

        <div class="bottom-ticker">
            <div class="ticker-move">
                +++ NEW GIVEAWAY SOON +++ JOIN NOW VIA LINK +++ BEST COMMUNITY +++ 
            </div>
        </div>
    </div>

    <script>
        async function fetchDiscord() {
            try {
                const response = await fetch("https://discord.com/api/guilds/1384998084307849367/widget.json");
                const data = await response.json();
                document.getElementById("memberCount").innerText = data.presence_count + " GAMERS ONLINE";
            } catch (e) {
                document.getElementById("memberCount").innerText = "DISCORD ACTIVE";
            }
        }
        fetchDiscord();
        setInterval(fetchDiscord, 30000);
    </script>
</body>
</html>
