<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --discord: #5865F2;
            --neon-green: #00ff88;
            --glass-bg: rgba(10, 11, 18, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 1000px;
            height: 300px;
        }

        /* Haupt-Panel ohne harten Rand */
        .glass-panel {
            position: relative;
            width: 900px;
            height: 200px;
            background: var(--glass-bg);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Cooler Hintergrund-Effekt: Animierte Mesh-Lines */
        .bg-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(circle, black, transparent 80%);
            animation: moveGrid 10s linear infinite;
            z-index: 1;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 30px 30px; }
        }

        /* Content Sektion */
        .text-content {
            z-index: 10;
        }

        .headline {
            font-size: 3.5rem;
            color: white;
            text-transform: uppercase;
            line-height: 1;
            margin: 0;
            letter-spacing: -1px;
        }

        .hype-text {
            color: var(--neon-green);
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.07);
            padding: 8px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .online-dot {
            width: 12px; height: 12px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green);
            animation: pulse 1.5s infinite;
        }

        /* QR Sektion */
        .qr-section {
            z-index: 10;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* Target-Ecken um den QR Code */
        .qr-target {
            position: relative;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        /* Die coolen Gamer-Ecken (Targeting Look) */
        .qr-target::before, .qr-target::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid var(--discord);
        }

        /* Oben Links & Unten Rechts */
        .qr-target::before {
            top: -10px; left: -10px;
            border-right: none; border-bottom: none;
        }
        .qr-target::after {
            bottom: -10px; right: -10px;
            border-left: none; border-top: none;
        }

        .qr-section img {
            display: block;
            width: 130px;
            height: 130px;
        }

        .qr-text {
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--discord);
        }

        @keyframes pulse {
            50% { opacity: 0.4; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="bg-effect"></div>

        <div class="text-content">
            <div class="hype-text">GET THE HYPE</div>
            <h1 class="headline">JOIN THE SQUAD</h1>
            <div class="live-badge">
                <div class="online-dot"></div>
                <span id="memberCount" style="color: white; font-size: 1.5rem;">...</span>
            </div>
        </div>

        <div class="qr-section">
            <div class="qr-target">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://discord.gg/GCdtRkHb6X" alt="QR Code">
            </div>
            <span class="qr-text">SCAN TO JOIN</span>
        </div>
    </div>

    <script>
        async function updateStats() {
            try {
                const res = await fetch("https://discord.com/api/guilds/1384998084307849367/widget.json");
                const data = await res.json();
                document.getElementById("memberCount").innerText = data.presence_count + " ONLINE";
            } catch {
                document.getElementById("memberCount").innerText = "JOIN NOW";
            }
        }
        updateStats();
        setInterval(updateStats, 30000);
    </script>
</body>
</html>
