<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d00ff;
            --discord: #5865F2;
            --green: #00ff88;
        }

        body {
            margin: 0;
            padding: 10px;
            background: transparent;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* Haupt-Rahmen */
        .banner-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 80px; /* Etwas höher für den Ticker */
            margin: 0 auto;
            background: rgba(5, 5, 10, 0.9);
            clip-path: polygon(3% 0%, 100% 0%, 97% 100%, 0% 100%);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Obere Sektion: Name & Action */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px 5px 40px;
            flex: 1;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-name {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* Untere Sektion: Der News-Ticker */
        .ticker-row {
            background: rgba(0, 210, 255, 0.15);
            height: 25px;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 1px solid rgba(0, 210, 255, 0.3);
            white-space: nowrap;
        }

        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
            font-size: 0.8rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            font-weight: bold;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Live-Counter */
        .live-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .dot {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
            animation: pulse 1s infinite;
        }

        /* Join Button */
        .btn-join {
            background: linear-gradient(45deg, var(--discord), var(--neon-purple));
            color: white;
            padding: 6px 20px;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 3px;
            box-shadow: 0 0 15px var(--neon-purple);
            animation: jump 5s infinite;
        }

        @keyframes jump {
            0%, 80%, 100% { transform: translateY(0); }
            85% { transform: translateY(-5px); }
            90% { transform: translateY(0); }
            95% { transform: translateY(-3px); }
        }

        @keyframes pulse {
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <div class="top-row">
            <div class="brand">
                <div class="live-status">
                    <div class="dot"></div>
                    <span id="memberCount">API...</span>
                </div>
                <span class="brand-name">Gaming Discord</span>
            </div>
            
            <a href="https://discord.gg/GCdtRkHb6X" target="_blank" class="btn-join">JOIN NOW!</a>
        </div>

        <div class="ticker-row">
            <div class="ticker-content" id="newsTicker">
                +++ NEUES TURNIER AM SAMSTAG +++ JOIN THE SQUAD FÜR EXKLUSIVE BONI +++ SUPPORT IST AKTIV +++ JETZT DEM DISCORD BEITRETEN +++ 
            </div>
        </div>
    </div>

    <script>
        // News-Ticker dynamisch anpassen (optional)
        const news = [
            "WILLKOMMEN IM STREAM!",
            "WIR SUCHEN NOCH MODERATOREN!",
            "GerneRNE FOLGEN!",
            "REGELMÄSIG LIVE!"
        ];
        // Du kannst den Text hier ändern:
        // document.getElementById("newsTicker").innerText = news.join(" +++ ");

        async function updateData() {
            try {
                const r = await fetch("https://discord.com/api/guilds/1384998084307849367/widget.json");
                const d = await r.json();
                document.getElementById("memberCount").innerText = d.presence_count + " ONLINE";
            } catch {
                document.getElementById("memberCount").innerText = "JOIN THE HUB";
            }
        }
        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
