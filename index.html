<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --discord: #5865F2;
            --neon-green: #00ff88;
            --neon-blue: #00d2ff;
            --dark: #050508;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Haupt-Banner */
        .power-banner {
            position: relative;
            width: 95%;
            height: 200px; /* Höher für den QR Code */
            background: var(--dark);
            clip-path: polygon(2% 0%, 98% 0%, 100% 20%, 100% 80%, 98% 100%, 2% 100%, 0% 80%, 0% 20%);
            border: 4px solid var(--discord);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 0 50px rgba(88, 101, 242, 0.6);
            color: white;
            z-index: 10;
        }

        /* Linke Seite: Text-Content */
        .content-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .headline {
            font-size: 2.8rem;
            text-transform: uppercase;
            line-height: 0.9;
            text-shadow: 0 0 20px var(--discord);
            margin: 0;
        }

        .sub-headline {
            color: var(--neon-green);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .stats-box {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 5px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid var(--neon-green);
            font-size: 1.6rem;
        }

        .dot {
            width: 15px; height: 15px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green);
            animation: pulse 1s infinite;
        }

        /* Rechte Seite: QR-Code Scanner */
        .qr-container {
            position: relative;
            width: 150px;
            height: 150px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 30px var(--neon-blue);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animierter Scanner-Strich */
        .qr-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan-line 2s linear infinite;
            z-index: 5;
        }

        @keyframes scan-line {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .qr-container img {
            width: 100%;
            height: 100%;
        }

        .qr-label {
            position: absolute;
            bottom: -25px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: var(--neon-blue);
            text-transform: uppercase;
        }

        /* Partikel-Effekt im Hintergrund */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes pulse {
            50% { opacity: 0.4; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="power-banner">
        <div class="content-left">
            <h1 class="headline">JOIN THE SQUAD</h1>
            <div class="sub-headline">GET THE HYPE</div>
            <div class="stats-box">
                <div class="dot"></div>
                <span id="memberCount">...</span>
            </div>
        </div>

        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://discord.gg/GCdtRkHb6X&color=050508" alt="QR Code">
            <div class="qr-label">SCAN TO JOIN</div>
        </div>
    </div>

    <script>
        // Live Member Counter
        async function update() {
            try {
                const res = await fetch("https://discord.com/api/guilds/1384998084307849367/widget.json");
                const data = await res.json();
                document.getElementById("memberCount").innerText = data.presence_count + " ONLINE";
            } catch(e) {
                document.getElementById("memberCount").innerText = "DISCORD ACTIVE";
            }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>
