<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Gaming Discord</title>
    <style>
        :root {
            --discord-blurple: #5865F2;
            --neon-purple: #9b59ff;
            --neon-green: #00ff88;
            --bg-dark: #0a0a14;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: white;
            text-align: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- BACKGROUND EFFECTS --- */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background: repeating-linear-gradient(
                90deg,
                rgba(88, 101, 242, 0.05) 0px,
                rgba(88, 101, 242, 0.05) 1px,
                transparent 1px,
                transparent 60px
            );
            animation: moveLines 15s linear infinite;
            z-index: -2;
        }

        @keyframes moveLines {
            from { transform: translate(0, 0); }
            to { transform: translate(-60px, 0); }
        }

        #particles-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: var(--discord-blurple);
            border-radius: 50%;
            opacity: 0.5;
            bottom: -10px;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            to { transform: translateY(-110vh); opacity: 0; }
        }

        /* --- HERO SECTION --- */
        .container {
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            animation: glitch 3s infinite alternate;
        }

        @keyframes glitch {
            0% { text-shadow: 3px 3px var(--discord-blurple); }
            33% { text-shadow: -3px -3px var(--neon-purple); }
            66% { text-shadow: 2px -2px var(--neon-green); }
            100% { text-shadow: -2px 2px var(--discord-blurple); }
        }

        /* --- LIVE COUNTER --- */
        .counter-box {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            margin-bottom: 40px;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: var(--neon-green);
            border-radius: 50%;
            margin-right: 15px;
            box-shadow: 0 0 15px var(--neon-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 5px var(--neon-green); }
            50% { transform: scale(1.3); box-shadow: 0 0 20px var(--neon-green); opacity: 0.7; }
            100% { transform: scale(1); box-shadow: 0 0 5px var(--neon-green); }
        }

        /* --- BUTTONS --- */
        .join-btn {
            display: inline-block;
            text-decoration: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, var(--discord-blurple), var(--neon-purple));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .join-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 50px var(--neon-green);
            letter-spacing: 2px;
        }

        /* --- WIDGET & 3D EFFECT --- */
        .content-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px;
            margin-top: 60px;
            perspective: 1000px; /* For 3D Tilt */
        }

        .tilt-card {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        iframe {
            border: none;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(88, 101, 242, 0.3);
            background: #2f3136;
        }

        /* --- QR CODE --- */
        .qr-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(155, 89, 255, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .qr-section img {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px var(--neon-purple));
        }

        @media (max-width: 768px) {
            .content-grid { gap: 30px; }
            iframe { width: 300px; height: 400px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div id="particles-container"></div>

    <div class="container">
        <header>
            <h1>🔥 Join The Squad 🔥</h1>
            <div class="counter-box">
                <div class="online-dot"></div>
                <span id="memberCount">Connecting to API...</span>
            </div>
        </header>

        <main>
            <a href="https://discord.gg/GCdtRkHb6X" target="_blank" class="join-btn">
                Jetzt Beitreten
            </a>

            <div class="content-grid">
                <div class="tilt-card" id="widget-card">
                    <iframe 
                        src="https://discord.com/widget?id=1384998084307849367&theme=dark" 
                        width="350" 
                        height="500" 
                        allowtransparency="true" 
                        frameborder="0" 
                        sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
                    </iframe>
                </div>

                <div class="tilt-card qr-section" id="qr-card">
                    <p style="margin-bottom: 15px; font-weight: bold; color: var(--neon-purple);">SCAN & PLAY</p>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://discord.gg/GCdtRkHb6X" alt="Discord QR Code">
                    <p style="font-size: 0.8rem; opacity: 0.7;">Mobil beitreten</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. LIVE MEMBER COUNTER ---
        async function updateMembers() {
            try {
                const response = await fetch("https://discord.com/api/guilds/1384998084307849367/widget.json");
                const data = await response.json();
                document.getElementById("memberCount").innerText = `${data.presence_count} Gamer online`;
            } catch (error) {
                document.getElementById("memberCount").innerText = "Server Online";
            }
        }
        updateMembers();
        setInterval(updateMembers, 30000); // Alle 30 Sek. aktualisieren

        // --- 2. PARTICLE SYSTEM ---
        const container = document.getElementById('particles-container');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Zufällige Werte
            const size = Math.random() * 5 + 2 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 3 + 2 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.opacity = Math.random();
            
            container.appendChild(particle);
        }

        // --- 3. 3D TILT EFFECT ---
        const cards = document.querySelectorAll('.tilt-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = (y - centerY) / 10;
                const rotateY = (centerX - x) / 10;
                
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'rotateX(0) rotateY(0) scale(1)';
            });
        });
    </script>
</body>
</html>
