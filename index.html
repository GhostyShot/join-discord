<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --discord: #5865F2;
            --neon-green: #00ff88;
            --neon-blue: #00d2ff;
            --glow-power: 0 0 50px 10px rgba(0, 210, 255, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px; /* Passend zu deiner TikTok-Einstellung */
            width: 1000px;
        }

        /* Container der den Glow hält, damit nichts abgeschnitten wird */
        .wrapper {
            position: relative;
            width: 900px; /* Kleiner als 1000px, damit der Glow Platz hat */
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Der animierte Ultra-Glow Rahmen */
        .banner-border {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--discord), var(--neon-blue), var(--neon-green), var(--discord));
            background-size: 300% 300%;
            animation: moveBorder 3s linear infinite;
            clip-path: polygon(5% 0%, 95% 0%, 100% 50%, 95% 100%, 5% 100%, 0% 50%);
            box-shadow: var(--glow-power); /* Extremer Außen-Glow */
        }

        @keyframes moveBorder {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            100% { background-position: 100% 50%; filter: hue-rotate(360deg); }
        }

        /* Das Carbon-Innere */
        .banner-main {
            position: relative;
            width: calc(100% - 8px); /* Platz für den Rahmen */
            height: calc(100% - 8px);
            background: 
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-size: auto, 150px; /* Carbon Textur vergrößert für mehr Effekt */
            clip-path: polygon(5% 0%, 95% 0%, 100% 50%, 95% 100%, 5% 100%, 0% 50%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            overflow: hidden;
            z-index: 2;
        }

        /* Extra Licht-Reflexe auf dem Carbon */
        .carbon-shimmer {
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: skewX(-30deg);
            animation: shimmer 4s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        /* Linke Seite: Content */
        .left-side { z-index: 5; }

        .headline {
            font-size: 3.5rem;
            margin: 0;
            color: white;
            text-transform: uppercase;
            letter-spacing: -2px;
            text-shadow: 0 0 20px var(--discord);
        }

        .hype-tag {
            color: var(--neon-green);
            font-size: 1.4rem;
            letter-spacing: 5px;
            font-weight: 900;
            margin-bottom: 5px;
            text-shadow: 0 0 15px var(--neon-green);
        }

        .online-box {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
            padding: 10px 25px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--neon-green);
            box-shadow: inset 0 0 15px var(--neon-green);
        }

        .discord-icon {
            width: 30px;
            fill: white;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Rechte Seite: QR */
        .qr-side {
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-frame {
            background: white;
            padding: 10px;
            border-radius: 5px;
            border: 5px solid var(--neon-blue);
            box-shadow: 0 0 30px var(--neon-blue);
            position: relative;
        }

        /* Animierter Scanner */
        .qr-frame::after {
            content: "";
            position: absolute;
            left: 0; width: 100%; height: 4px;
            background: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }

        @keyframes pulse {
            50% { transform: scale(1.2); opacity: 0.6; }
        }
    </style>
</head>
<body>

        <div class="banner-border"></div>

        <div class="banner-main">
            <div class="carbon-shimmer"></div>

            <div class="left-side">
                <div class="hype-tag">GENERATE THE HYPE</div>
                <h1 class="headline">JOIN THE SQUAD</h1>
